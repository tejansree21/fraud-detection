<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FraudSentinel — Real-Time Detection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg:        #0a0a0f;
      --bg2:       #111118;
      --bg3:       #1a1a24;
      --border:    #2a2a38;
      --accent:    #00ff88;
      --accent2:   #ff3366;
      --accent3:   #3d9eff;
      --warn:      #ffaa00;
      --text:      #e8e8f0;
      --muted:     #666680;
      --mono:      'Space Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,255,136,0.015) 2px,
        rgba(0,255,136,0.015) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.8); }
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border: 1px solid var(--accent);
      border-radius: 2px;
      color: var(--accent);
      font-size: 10px;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s ease infinite;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      padding: 24px 0;
    }
    .nav-section {
      padding: 0 16px;
      margin-bottom: 8px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
      font-weight: 400;
    }
    .nav-item:hover { color: var(--text); background: var(--bg3); }
    .nav-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0,255,136,0.05);
    }
    .nav-icon { font-size: 14px; width: 20px; text-align: center; }
    .nav-badge {
      margin-left: auto;
      background: var(--accent2);
      color: white;
      font-size: 9px;
      font-family: var(--mono);
      padding: 1px 5px;
      border-radius: 2px;
    }

    /* Main content */
    .main { padding: 28px 32px; overflow-y: auto; }

    /* Page title */
    .page-title {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      letter-spacing: -1px;
    }
    .page-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }
    .stat-card.green::before  { background: var(--accent); }
    .stat-card.red::before    { background: var(--accent2); }
    .stat-card.blue::before   { background: var(--accent3); }
    .stat-card.yellow::before { background: var(--warn); }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 32px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }
    .stat-card.green .stat-value  { color: var(--accent); }
    .stat-card.red .stat-value    { color: var(--accent2); }
    .stat-card.blue .stat-value   { color: var(--accent3); }
    .stat-card.yellow .stat-value { color: var(--warn); }
    .stat-delta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--mono);
    }

    /* Two column layout */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .full-width { margin-bottom: 24px; }

    /* Panel */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text);
    }
    .panel-action {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      border: 1px solid var(--accent);
      padding: 3px 8px;
      border-radius: 2px;
      background: none;
      transition: all 0.15s;
    }
    .panel-action:hover { background: rgba(0,255,136,0.1); }

    /* Score bar */
    .score-bar-wrap { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .score-bar-label {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .score-bar-track {
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
    }

    /* Transaction table */
    .tx-table { width: 100%; border-collapse: collapse; }
    .tx-table th {
      text-align: left;
      padding: 10px 20px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      font-weight: 400;
    }
    .tx-table td {
      padding: 12px 20px;
      font-size: 12px;
      border-bottom: 1px solid rgba(42,42,56,0.5);
      vertical-align: middle;
    }
    .tx-table tr:hover td { background: rgba(255,255,255,0.02); }
    .tx-table tr:last-child td { border-bottom: none; }

    .tx-id {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }
    .tx-amount {
      font-family: var(--mono);
      font-weight: 700;
      color: var(--text);
    }

    /* Score badge */
    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 2px;
    }
    .score-high   { background: rgba(255,51,102,0.15); color: var(--accent2); border: 1px solid rgba(255,51,102,0.3); }
    .score-medium { background: rgba(255,170,0,0.15);  color: var(--warn);    border: 1px solid rgba(255,170,0,0.3); }
    .score-low    { background: rgba(0,255,136,0.1);   color: var(--accent);  border: 1px solid rgba(0,255,136,0.2); }

    /* Action badge */
    .action-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 2px;
      font-weight: 700;
    }
    .action-BLOCK  { background: rgba(255,51,102,0.2); color: var(--accent2); }
    .action-REVIEW { background: rgba(255,170,0,0.2);  color: var(--warn); }
    .action-ALLOW  { background: rgba(0,255,136,0.15); color: var(--accent); }
    .action-NA     { background: var(--bg3); color: var(--muted); }

    /* Mini chart */
    .mini-chart {
      padding: 16px 20px;
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 80px;
    }
    .bar-col {
      flex: 1;
      border-radius: 2px 2px 0 0;
      transition: height 0.6s cubic-bezier(0.4,0,0.2,1);
      min-height: 3px;
    }

    /* Report modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      width: 640px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
    }
    .modal-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      transition: all 0.15s;
    }
    .modal-close:hover { border-color: var(--accent2); color: var(--accent2); }
    .modal-body { padding: 20px; }
    .report-text {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      background: var(--bg3);
      padding: 16px;
      border-left: 3px solid var(--accent3);
      margin-bottom: 16px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .meta-item {
      background: var(--bg3);
      padding: 10px 14px;
      border: 1px solid var(--border);
    }
    .meta-key {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .meta-val {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      font-weight: 700;
    }

    /* Feedback buttons */
    .feedback-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .fb-btn {
      flex: 1;
      padding: 10px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.15s;
      font-weight: 700;
    }
    .fb-fraud  { background: rgba(255,51,102,0.15); border: 1px solid var(--accent2); color: var(--accent2); }
    .fb-fp     { background: rgba(0,255,136,0.1);   border: 1px solid var(--accent);  color: var(--accent); }
    .fb-review { background: rgba(255,170,0,0.1);   border: 1px solid var(--warn);    color: var(--warn); }
    .fb-fraud:hover  { background: rgba(255,51,102,0.3); }
    .fb-fp:hover     { background: rgba(0,255,136,0.2); }
    .fb-review:hover { background: rgba(255,170,0,0.2); }

    /* Health panel */
    .health-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
    }
    .health-item {
      background: var(--bg2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .health-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .health-dot.ok      { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .health-dot.warn    { background: var(--warn); }
    .health-dot.error   { background: var(--accent2); }
    .health-name {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text);
    }
    .health-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Empty state */
    .empty {
      padding: 48px 20px;
      text-align: center;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }

    /* Loading spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--bg3);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 10px 16px;
      font-family: var(--mono);
      font-size: 11px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0); opacity: 1; }
    }

    /* Drift indicator */
    .drift-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,170,0,0.1);
      border: 1px solid rgba(255,170,0,0.3);
      margin-bottom: 20px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--warn);
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API = window.FRAUD_API_URL || 'https://fraud-detection-api-riwh.onrender.com';;

// ── API helpers ────────────────────────────────────────────────────────────────
const api = {
  get: (path) => fetch(`${API}${path}`).then(r => r.json()).catch(() => null),
  post: (path, body) => fetch(`${API}${path}`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  }).then(r => r.json()).catch(() => null),
};

// ── Score colour helper ────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s >= 0.7) return 'score-high';
  if (s >= 0.5) return 'score-medium';
  return 'score-low';
}

function scoreColor(s) {
  if (s >= 0.7) return 'var(--accent2)';
  if (s >= 0.5) return 'var(--warn)';
  return 'var(--accent)';
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2500); return () => clearTimeout(t); }, []);
  return <div className="toast">✓ {msg}</div>;
}

// ── Report modal ───────────────────────────────────────────────────────────────
function ReportModal({ txId, onClose }) {
  const [report, setReport] = useState(null);
  const [loading, setLoading] = useState(true);
  const [submitted, setSubmitted] = useState(false);

  useEffect(() => {
    api.get(`/report/${txId}`).then(d => { setReport(d); setLoading(false); });
  }, [txId]);

  async function submitFeedback(decision) {
    await api.post('/feedback', {
      transaction_id: txId,
      investigator_id: 'dashboard_user',
      decision,
      notes: `Submitted via dashboard`,
    });
    setSubmitted(true);
    setTimeout(onClose, 1000);
  }

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="panel-title">CASE REPORT</span>
          <button className="modal-close" onClick={onClose}>✕ CLOSE</button>
        </div>
        <div className="modal-body">
          {loading ? (
            <div className="empty"><div className="spinner" /></div>
          ) : !report ? (
            <div className="empty">No report available for this transaction.</div>
          ) : (
            <>
              <div className="meta-grid">
                <div className="meta-item">
                  <div className="meta-key">Transaction ID</div>
                  <div className="meta-val" style={{fontSize:10}}>{txId.slice(0,18)}…</div>
                </div>
                <div className="meta-item">
                  <div className="meta-key">Recommended Action</div>
                  <div className="meta-val">
                    <span className={`action-badge action-${report.recommended_action}`}>
                      {report.recommended_action}
                    </span>
                  </div>
                </div>
                <div className="meta-item">
                  <div className="meta-key">Confidence</div>
                  <div className="meta-val">{(report.confidence_score * 100).toFixed(0)}%</div>
                </div>
                <div className="meta-item">
                  <div className="meta-key">Similar Cases</div>
                  <div className="meta-val">{report.similar_cases?.length || 0} found</div>
                </div>
              </div>
              <div className="report-text">{report.report_text}</div>
              {report.similar_cases?.length > 0 && (
                <div style={{marginBottom:16}}>
                  <div className="panel-title" style={{marginBottom:10}}>SIMILAR HISTORICAL CASES</div>
                  {report.similar_cases.slice(0,3).map((c,i) => (
                    <div key={i} style={{
                      padding:'10px 14px', background:'var(--bg3)',
                      border:'1px solid var(--border)', marginBottom:6,
                      display:'flex', justifyContent:'space-between',
                      alignItems:'center', fontSize:12,
                    }}>
                      <span style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)'}}>
                        ${c.amount?.toFixed(2)} · {c.merchant_category}
                      </span>
                      <span style={{display:'flex', gap:8, alignItems:'center'}}>
                        <span className={`action-badge action-${c.recommended_action}`}>{c.recommended_action}</span>
                        <span style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--accent3)'}}>
                          {(c.similarity*100).toFixed(0)}% similar
                        </span>
                      </span>
                    </div>
                  ))}
                </div>
              )}
              {!submitted ? (
                <div>
                  <div className="panel-title" style={{marginBottom:10}}>INVESTIGATOR DECISION</div>
                  <div className="feedback-row">
                    <button className="fb-btn fb-fraud" onClick={() => submitFeedback('CONFIRMED_FRAUD')}>
                      ⚠ CONFIRM FRAUD
                    </button>
                    <button className="fb-btn fb-fp" onClick={() => submitFeedback('FALSE_POSITIVE')}>
                      ✓ FALSE POSITIVE
                    </button>
                    <button className="fb-btn fb-review" onClick={() => submitFeedback('NEEDS_REVIEW')}>
                      ⟳ NEEDS REVIEW
                    </button>
                  </div>
                </div>
              ) : (
                <div className="empty" style={{color:'var(--accent)'}}>✓ Decision recorded</div>
              )}
            </>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Score distribution mini chart ──────────────────────────────────────────────
function ScoreDistChart({ data }) {
  if (!data?.length) return <div className="empty">No data yet</div>;
  const max = Math.max(...data.map(d => Number(d.count)));
  return (
    <div className="mini-chart">
      {data.map((d, i) => (
        <div key={i} className="bar-col" style={{
          height: `${(Number(d.count) / max) * 100}%`,
          background: scoreColor(Number(d.score_bucket)),
          opacity: 0.8,
        }} title={`Score ${d.score_bucket}: ${d.count} transactions`} />
      ))}
    </div>
  );
}

// ── Transaction row ────────────────────────────────────────────────────────────
function TxRow({ tx, onSelect }) {
  const score = Number(tx.fraud_score);
  return (
    <tr>
      <td><span className="tx-id">{tx.transaction_id?.slice(0,12)}…</span></td>
      <td><span className="tx-amount">${Number(tx.amount).toFixed(2)}</span></td>
      <td style={{fontSize:12, color:'var(--muted)'}}>{tx.merchant_category}</td>
      <td style={{fontSize:11, color:'var(--muted)', fontFamily:'var(--mono)'}}>
        {tx.location}
      </td>
      <td>
        <span className={`score-badge ${scoreClass(score)}`}>
          {score.toFixed(3)}
        </span>
      </td>
      <td>
        <span className={`action-badge action-${tx.recommended_action || 'NA'}`}>
          {tx.recommended_action || 'PENDING'}
        </span>
      </td>
      <td>
        {tx.recommended_action ? (
          <button className="panel-action" onClick={() => onSelect(tx.transaction_id)}>
            VIEW REPORT
          </button>
        ) : (
          <span style={{fontSize:11, color:'var(--muted)'}}>—</span>
        )}
      </td>
    </tr>
  );
}

// ── Dashboard page ─────────────────────────────────────────────────────────────
function Dashboard({ stats, flagged, health, scoreData, onSelectTx, driftActive }) {
  const db = stats?.db || {};
  const total    = Number(db.total_transactions || stats?.total_processed || 0);
  const flaggedN = Number(db.total_flagged     || stats?.total_flagged    || 0);
  const blocked  = Number(db.blocked || 0);
  const feedback = Number(db.feedback_count || 0);
  const flagRate = total > 0 ? ((flaggedN / total) * 100).toFixed(1) : '0.0';

  return (
    <>
      {driftActive && (
        <div className="drift-indicator">
          ⚠ DRIFT DETECTED — Model performance may be degrading. Retraining recommended.
        </div>
      )}
      <div className="stats-grid">
        <div className="stat-card green">
          <div className="stat-label">Processed</div>
          <div className="stat-value">{total.toLocaleString()}</div>
          <div className="stat-delta">total transactions</div>
        </div>
        <div className="stat-card red">
          <div className="stat-label">Flagged</div>
          <div className="stat-value">{flaggedN.toLocaleString()}</div>
          <div className="stat-delta">{flagRate}% flag rate</div>
        </div>
        <div className="stat-card yellow">
          <div className="stat-label">Blocked</div>
          <div className="stat-value">{blocked.toLocaleString()}</div>
          <div className="stat-delta">high confidence fraud</div>
        </div>
        <div className="stat-card blue">
          <div className="stat-label">Feedback</div>
          <div className="stat-value">{feedback.toLocaleString()}</div>
          <div className="stat-delta">investigator decisions</div>
        </div>
      </div>

      <div className="two-col">
        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">FRAUD SCORE DISTRIBUTION</span>
          </div>
          <ScoreDistChart data={scoreData} />
          <div style={{padding:'0 20px 12px', display:'flex', justifyContent:'space-between'}}>
            <span style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--accent)'}}>LOW RISK</span>
            <span style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--warn)'}}>MED</span>
            <span style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--accent2)'}}>HIGH RISK</span>
          </div>
        </div>

        <div className="panel">
          <div className="panel-header">
            <span className="panel-title">SYSTEM HEALTH</span>
          </div>
          <div className="health-grid">
            {[
              { name: 'Anomaly Detector', key: 'anomaly_detector' },
              { name: 'Context Enricher', key: 'context_enricher' },
              { name: 'Case Reporter',    key: 'case_reporter'    },
            ].map(({ name, key }) => {
              const agent = health?.agents?.[key];
              const ok    = agent?.healthy !== false;
              return (
                <div key={key} className="health-item">
                  <div className={`health-dot ${ok ? 'ok' : 'error'}`} />
                  <div>
                    <div className="health-name">{name}</div>
                    <div className="health-sub">
                      {agent ? `${agent.total_processed || 0} processed` : 'loading…'}
                    </div>
                  </div>
                </div>
              );
            })}
            <div className="health-item">
              <div className={`health-dot ${health?.db === 'connected' ? 'ok' : 'warn'}`} />
              <div>
                <div className="health-name">PostgreSQL</div>
                <div className="health-sub">{health?.db || 'checking…'}</div>
              </div>
            </div>
            <div className="health-item">
              <div className="health-dot ok" />
              <div>
                <div className="health-name">Redis Store</div>
                <div className="health-sub">feature store</div>
              </div>
            </div>
            <div className="health-item">
              <div className={`health-dot ${driftActive ? 'warn' : 'ok'}`} />
              <div>
                <div className="health-name">Drift Monitor</div>
                <div className="health-sub">{driftActive ? 'drift detected' : 'stable'}</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div className="panel full-width">
        <div className="panel-header">
          <span className="panel-title">RECENT FLAGGED TRANSACTIONS</span>
          <span style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)'}}>
            {flagged.length} shown
          </span>
        </div>
        {flagged.length === 0 ? (
          <div className="empty">No flagged transactions yet. Run the producer to stream data.</div>
        ) : (
          <table className="tx-table">
            <thead>
              <tr>
                <th>TX ID</th>
                <th>AMOUNT</th>
                <th>CATEGORY</th>
                <th>LOCATION</th>
                <th>FRAUD SCORE</th>
                <th>ACTION</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              {flagged.slice(0,20).map(tx => (
                <TxRow key={tx.transaction_id} tx={tx} onSelect={onSelectTx} />
              ))}
            </tbody>
          </table>
        )}
      </div>
    </>
  );
}

// ── Live Feed page ─────────────────────────────────────────────────────────────
function LiveFeed({ onSelectTx }) {
  const [tx, setTx] = useState({ user_id:'', amount:'', merchant:'', merchant_category:'unknown', location:'unknown', device_id:'unknown', ip_address:'unknown' });
  const [result, setResult] = useState(null);
  const [loading, setLoading] = useState(false);

  async function submit() {
    setLoading(true);
    const res = await api.post('/transaction', {...tx, amount: parseFloat(tx.amount)||0});
    setResult(res);
    setLoading(false);
  }

  return (
    <div style={{maxWidth:560}}>
      <div className="panel" style={{marginBottom:20}}>
        <div className="panel-header"><span className="panel-title">SUBMIT TRANSACTION</span></div>
        <div style={{padding:20, display:'flex', flexDirection:'column', gap:12}}>
          {[
            ['user_id', 'User ID', 'user_42'],
            ['amount', 'Amount ($)', '1500.00'],
            ['merchant', 'Merchant', 'CryptoExchange'],
            ['merchant_category', 'Category', 'unknown'],
            ['location', 'Location', 'unknown'],
            ['device_id', 'Device ID', 'dev_new_999'],
          ].map(([key, label, ph]) => (
            <div key={key}>
              <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--muted)', letterSpacing:'1.5px', textTransform:'uppercase', marginBottom:4}}>
                {label}
              </div>
              <input
                style={{
                  width:'100%', background:'var(--bg3)', border:'1px solid var(--border)',
                  color:'var(--text)', padding:'8px 12px', fontFamily:'var(--mono)', fontSize:12,
                  outline:'none',
                }}
                value={tx[key]}
                onChange={e => setTx(p => ({...p, [key]: e.target.value}))}
                placeholder={ph}
              />
            </div>
          ))}
          <button
            onClick={submit}
            disabled={loading}
            style={{
              padding:'12px', background:'rgba(0,255,136,0.1)', border:'1px solid var(--accent)',
              color:'var(--accent)', fontFamily:'var(--mono)', fontSize:12, cursor:'pointer',
              letterSpacing:'1px', marginTop:4, transition:'all 0.15s',
            }}
          >
            {loading ? '⟳ PROCESSING…' : '→ SUBMIT TO PIPELINE'}
          </button>
        </div>
      </div>

      {result && (
        <div className="panel">
          <div className="panel-header"><span className="panel-title">PIPELINE RESULT</span></div>
          <div style={{padding:20}}>
            <div className="meta-grid">
              <div className="meta-item">
                <div className="meta-key">Fraud Score</div>
                <div className="meta-val">
                  <span className={`score-badge ${scoreClass(result.fraud_score)}`}>
                    {Number(result.fraud_score).toFixed(4)}
                  </span>
                </div>
              </div>
              <div className="meta-item">
                <div className="meta-key">Action</div>
                <div className="meta-val">
                  <span className={`action-badge action-${result.action || 'NA'}`}>
                    {result.action || 'PENDING'}
                  </span>
                </div>
              </div>
              <div className="meta-item">
                <div className="meta-key">Was Flagged</div>
                <div className="meta-val" style={{color: result.was_flagged ? 'var(--accent2)' : 'var(--accent)'}}>
                  {result.was_flagged ? 'YES' : 'NO'}
                </div>
              </div>
              <div className="meta-item">
                <div className="meta-key">Latency</div>
                <div className="meta-val">{result.total_latency_ms?.toFixed(0)}ms</div>
              </div>
            </div>
            {result.report_available && (
              <button className="panel-action" style={{width:'100%', padding:'10px'}}
                onClick={() => onSelectTx(result.transaction_id)}>
                VIEW FULL REPORT →
              </button>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage]         = useState('dashboard');
  const [stats, setStats]       = useState(null);
  const [flagged, setFlagged]   = useState([]);
  const [health, setHealth]     = useState(null);
  const [scoreData, setScoreData] = useState([]);
  const [selectedTx, setSelectedTx] = useState(null);
  const [toast, setToast]       = useState(null);
  const [driftActive, setDriftActive] = useState(false);

  const refresh = useCallback(async () => {
    const [s, h] = await Promise.all([
      api.get('/stats'),
      api.get('/health'),
    ]);
    if (s) {
      setStats(s);
      // Check drift
      const drift = s.drift;
      if (drift?.score?.drift_detected || drift?.flag_rate?.drift_detected) {
        setDriftActive(true);
      }
    }
    if (h) setHealth(h);

    // Fetch recent flagged from DB via stats endpoint
    // (in production, add a /flagged endpoint)
    if (s?.db?.total_flagged > 0) {
      // Mock data from stats until we add the /flagged endpoint
      setFlagged(prev => prev);
    }
  }, []);

  useEffect(() => {
    refresh();
    const interval = setInterval(refresh, 5000);
    return () => clearInterval(interval);
  }, [refresh]);

  const navItems = [
    { id: 'dashboard', icon: '◈', label: 'Dashboard' },
    { id: 'live',      icon: '⟳', label: 'Live Feed' },
  ];

  return (
    <div>
      <header className="header">
        <div className="logo">
          <div className="logo-dot" />
          FRAUDSENTINEL
        </div>
        <div className="header-right">
          <span>MSc AI · NCI Dublin · 2026</span>
          <div className="status-pill">
            <div className="status-dot" />
            LIVE
          </div>
        </div>
      </header>

      <div className="layout">
        <aside className="sidebar">
          <div style={{padding:'0 16px 16px', marginBottom:8}}>
            <div className="nav-section">Navigation</div>
          </div>
          {navItems.map(item => (
            <div
              key={item.id}
              className={`nav-item ${page === item.id ? 'active' : ''}`}
              onClick={() => setPage(item.id)}
            >
              <span className="nav-icon">{item.icon}</span>
              {item.label}
            </div>
          ))}

          <div style={{padding:'24px 16px 8px', marginTop:8}}>
            <div className="nav-section">Pipeline Status</div>
          </div>

          {/* Drift monitors */}
          {stats?.drift && Object.entries(stats.drift).map(([key, d]) => (
            <div key={key} style={{padding:'8px 20px'}}>
              <div style={{fontFamily:'var(--mono)', fontSize:9, color:'var(--muted)', letterSpacing:'1.5px', textTransform:'uppercase', marginBottom:4}}>
                {key.replace('_', ' ')}
              </div>
              <div style={{display:'flex', gap:6, alignItems:'center'}}>
                <div style={{
                  width:6, height:6, borderRadius:'50%',
                  background: d.drift_detected ? 'var(--warn)' : 'var(--accent)',
                }} />
                <span style={{fontFamily:'var(--mono)', fontSize:10, color:'var(--muted)'}}>
                  μ={d.current_mean?.toFixed(3) || '0.000'}
                </span>
              </div>
            </div>
          ))}

          <div style={{position:'absolute', bottom:24, left:0, right:0, padding:'0 20px'}}>
            <div style={{
              padding:'10px 14px',
              background:'rgba(0,255,136,0.05)',
              border:'1px solid rgba(0,255,136,0.15)',
              fontFamily:'var(--mono)',
              fontSize:9,
              color:'var(--muted)',
              lineHeight:1.6,
            }}>
              <div style={{color:'var(--accent)', marginBottom:4}}>SYSTEM INFO</div>
              <div>Processed: {stats?.total_processed || 0}</div>
              <div>Flagged: {stats?.total_flagged || 0}</div>
              <div>DB: {health?.db || '—'}</div>
            </div>
          </div>
        </aside>

        <main className="main">
          {page === 'dashboard' && (
            <>
              <div className="page-title">FRAUD DETECTION PIPELINE</div>
              <div className="page-sub">Real-time monitoring · Multi-agent system · MSc AI Dissertation</div>
              <Dashboard
                stats={stats}
                flagged={flagged}
                health={health}
                scoreData={scoreData}
                onSelectTx={setSelectedTx}
                driftActive={driftActive}
              />
            </>
          )}
          {page === 'live' && (
            <>
              <div className="page-title">LIVE TRANSACTION FEED</div>
              <div className="page-sub">Submit transactions directly to the pipeline</div>
              <LiveFeed onSelectTx={setSelectedTx} />
            </>
          )}
        </main>
      </div>

      {selectedTx && (
        <ReportModal
          txId={selectedTx}
          onClose={() => setSelectedTx(null)}
        />
      )}

      {toast && <Toast msg={toast} onDone={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
